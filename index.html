<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancomycin Calculator (BVQY 175)</title>
    
    <!-- Tải Tailwind CSS để xử lý giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tải React và ReactDOM qua CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Tải Babel để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <!-- Nơi React sẽ render ứng dụng -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Định nghĩa các inline SVG icon để file hoàn toàn độc lập
        const IconCalculator = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                <line x1="8" y1="6" x2="16" y2="6"></line>
                <line x1="16" y1="14" x2="16" y2="18"></line>
                <path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path>
            </svg>
        );

        const IconActivity = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        );

        const IconSyringe = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="18 2 22 6"></polyline>
                <line x1="18" y1="2" x2="22" y2="6"></line>
                <line x1="14" y1="4" x2="14.5" y2="4.5"></line>
                <line x1="10" y1="8" x2="10.5" y2="8.5"></line>
                <path d="M19.22 8.78A2 2 0 0 0 17.81 8.2L13.8 4.19a2 2 0 0 0-2.83 0l-1.41 1.41 7.07 7.07 1.41-1.41a2 2 0 0 0 1.18-2.48z"></path>
                <path d="M9.17 11.23L4.93 15.47a2.83 2.83 0 1 0 4 4l4.24-4.24-4-4z"></path>
                <line x1="2" y1="22" x2="4.93" y2="19.07"></line>
            </svg>
        );

        const IconAlertCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const IconInfo = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        );

        // Tính Creatinine Clearance (Cockcroft-Gault)
        const calculateCrCl = (age, weight, scr, isFemale) => {
            if (!age || !weight || !scr) return 0;
            let crcl = ((140 - age) * weight) / (72 * scr);
            if (isFemale) crcl *= 0.85;
            return crcl.toFixed(1);
        };

        // Tính BMI
        const calculateBMI = (weight, height) => {
            if (!weight || !height) return 0;
            return (weight / ((height / 100) ** 2)).toFixed(1);
        };

        // Liều nạp truyền ngắt quãng (II)
        const getIILoadingDose = (weight, crrt) => {
            if (crrt) return { dose: "20-25 mg/kg (Tối đa 2000mg)", vol: "500 mL", time: "4 giờ" };
            if (!weight) return { dose: "---", vol: "-", time: "-" };
            if (weight < 36) return { dose: "Chưa có dl chuẩn", vol: "-", time: "-" };
            if (weight <= 45) return { dose: "750 mg", vol: "250 mL", time: "90 phút" };
            if (weight <= 55) return { dose: "1000 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 65) return { dose: "1250 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 75) return { dose: "1500 mg", vol: "500 mL", time: "3 giờ" };
            if (weight <= 120) return { dose: "1750 mg", vol: "500 mL", time: "4 giờ" };
            return { dose: "2000 mg", vol: "500 mL", time: "4 giờ" };
        };

        // Liều nạp truyền liên tục (CI)
        const getCILoadingDose = (weight, crcl) => {
            if (!weight) return { dose: "---", vol: "-", time: "-" };
            if (weight < 40) return { dose: "750 mg", vol: "250 mL", time: "90 phút" };
            if (weight <= 44) return { dose: "1000 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 54) return { dose: "1250 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 64) return { dose: "1500 mg", vol: "500 mL", time: "3 giờ" };
            if (weight <= 79) return { dose: "2000 mg", vol: "500 mL", time: "4 giờ" };
            if (weight <= 119) return { dose: "2500 mg", vol: "750 mL", time: "4 giờ" };
            if (crcl < 60) return { dose: "2500 mg", vol: "750 mL", time: "4 giờ" };
            return { dose: "3000 mg (Tối đa)", vol: "750 mL", time: "4 giờ" };
        };

        // Tốc độ truyền duy trì liên tục (CI) (Dung dịch 4mg/mL)
        const getCIMaintenanceRate = (crcl) => {
            if (!crcl) return 0;
            if (crcl < 10) return 3;
            if (crcl <= 15) return 4;
            if (crcl <= 20) return 5;
            if (crcl <= 30) return 8;
            if (crcl <= 40) return 10;
            if (crcl <= 50) return 12;
            if (crcl <= 62) return 15;
            if (crcl <= 83) return 20;
            if (crcl <= 99) return 23;
            return 30; // >=100
        };

        // Tính toán Sawchuk-Zaske (Mô hình 1 ngăn mở)
        const calculateSZ = (dose, tau, tInf, cPeak, cTrough, t1, t2) => {
            if (!dose || !tau || !tInf || !cPeak || !cTrough) return null;
            
            // t1: time from end of infusion to peak draw
            // t2: time from trough draw to next dose
            const deltaT = tau - tInf - t1 - t2; 
            
            if (deltaT <= 0 || cPeak <= cTrough) return { error: "Dữ liệu thời gian/nồng độ không hợp lệ" };

            // 1. Elimination Rate Constant (Ke)
            const ke = Math.log(cPeak / cTrough) / deltaT;
            
            // 2. True Peak & True Trough
            const truePeak = cPeak * Math.exp(ke * t1);
            const trueTrough = cTrough * Math.exp(-ke * t2);

            // 3. Volume of Distribution (Vd)
            const vd = (dose * (1 - Math.exp(-ke * tInf))) / (tInf * ke * (truePeak - trueTrough * Math.exp(-ke * tInf)));

            // 4. Clearance (CL)
            const cl = ke * vd;

            // 5. Daily AUC
            const dailyDose = dose * (24 / tau);
            const auc24 = dailyDose / cl;

            return {
                ke: ke.toFixed(4),
                halfLife: (0.693 / ke).toFixed(1),
                truePeak: truePeak.toFixed(1),
                trueTrough: trueTrough.toFixed(1),
                vd: vd.toFixed(1),
                cl: cl.toFixed(2),
                auc24: auc24.toFixed(0)
            };
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('empiric');
            
            // Thông tin bệnh nhân
            const [age, setAge] = useState('');
            const [weight, setWeight] = useState('');
            const [height, setHeight] = useState('');
            const [scr, setScr] = useState('');
            const [isFemale, setIsFemale] = useState(false);
            const [crrt, setCrrt] = useState(false);

            // Các giá trị được tính toán
            const crcl = calculateCrCl(Number(age), Number(weight), Number(scr), isFemale);
            const bmi = calculateBMI(Number(weight), Number(height));
            
            // Phác đồ
            const iiLoad = getIILoadingDose(Number(weight), crrt);
            const ciLoad = getCILoadingDose(Number(weight), Number(crcl));
            const ciMaintRate = getCIMaintenanceRate(Number(crcl));
            const ciMaintDose24 = ciMaintRate * 4 * 24; 

            // TDM - Sawchuk Zaske State
            const [szDose, setSzDose] = useState('');
            const [szTau, setSzTau] = useState('12');
            const [szTInf, setSzTInf] = useState('1');
            const [szCPeak, setSzCPeak] = useState('');
            const [szCTrough, setSzCTrough] = useState('');
            const [szT1, setSzT1] = useState('1'); 
            const [szT2, setSzT2] = useState('0.5'); 
            const [targetAUC, setTargetAUC] = useState('500');

            const szResult = calculateSZ(
                Number(szDose), Number(szTau), Number(szTInf), 
                Number(szCPeak), Number(szCTrough), Number(szT1), Number(szT2)
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {}
                        <div className="bg-blue-800 text-white p-6 rounded-2xl shadow-lg flex flex-col md:flex-row items-center justify-between">
                            <div className="flex items-center space-x-4 mb-4 md:mb-0">
                                <div className="bg-white p-3 rounded-full text-blue-800">
                                    <IconCalculator size={32} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold">Vancomycin Calculator</h1>
                                    <p className="text-blue-200">Theo phác đồ Bệnh viện Quân y 175 (Khoa A4)</p>
                                </div>
                            </div>
                            <div className="text-right text-sm text-blue-200 flex flex-col items-end">
                                <span className="flex items-center"><IconActivity size={16} className="mr-1" /> TDM & PK/PD Ready</span>
                                <span className="opacity-75 mt-1">Hỗ trợ tra cứu lâm sàng (Bản Web)</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            {}
                            <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                <h2 className="text-lg font-bold mb-4 flex items-center border-b pb-2">
                                    Thông tin bệnh nhân
                                </h2>
                                <div className="space-y-4">
                                    <div className="flex bg-slate-100 rounded-lg p-1">
                                        <button 
                                            onClick={() => setIsFemale(false)}
                                            className={`flex-1 py-2 rounded-md text-sm font-medium transition-colors ${!isFemale ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}
                                        >Nam</button>
                                        <button 
                                            onClick={() => setIsFemale(true)}
                                            className={`flex-1 py-2 rounded-md text-sm font-medium transition-colors ${isFemale ? 'bg-white shadow text-pink-600' : 'text-slate-500'}`}
                                        >Nữ</button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 uppercase">Tuổi (năm)</label>
                                            <input type="number" value={age} onChange={(e)=>setAge(e.target.value)} className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 uppercase">Cân nặng (kg)</label>
                                            <input type="number" value={weight} onChange={(e)=>setWeight(e.target.value)} className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 uppercase">Chiều cao (cm)</label>
                                            <input type="number" value={height} onChange={(e)=>setHeight(e.target.value)} className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 uppercase">Scr (mg/dL)</label>
                                            <input type="number" step="0.1" value={scr} onChange={(e)=>setScr(e.target.value)} className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                    </div>

                                    <label className="flex items-center space-x-2 bg-slate-50 p-3 rounded border border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors">
                                        <input type="checkbox" checked={crrt} onChange={(e)=>setCrrt(e.target.checked)} className="rounded text-blue-600 w-4 h-4" />
                                        <span className="text-sm font-medium">Bệnh nhân đang lọc máu (CRRT)</span>
                                    </label>

                                    <div className="pt-4 border-t border-slate-200">
                                        <div className="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-100">
                                            <span className="font-semibold text-blue-800">CrCl (ml/phút)</span>
                                            <span className="text-xl font-bold text-blue-700">{crcl > 0 ? crcl : '--'}</span>
                                        </div>
                                        <div className="flex justify-between items-center mt-2 text-sm text-slate-600 px-1">
                                            <span>BMI: <strong className={bmi > 30 ? 'text-orange-500' : ''}>{bmi > 0 ? bmi : '--'}</strong></span>
                                            {bmi > 30 && <span className="text-orange-500 text-xs font-semibold">Béo phì</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-4">
                                
                                {}
                                <div className="flex space-x-2 bg-slate-200 p-1 rounded-xl shadow-inner">
                                    <button 
                                        onClick={() => setActiveTab('empiric')}
                                        className={`flex-1 flex items-center justify-center py-3 rounded-lg font-semibold transition-all duration-200 ${activeTab === 'empiric' ? 'bg-white text-blue-700 shadow-md' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-300'}`}
                                    >
                                        <IconSyringe size={18} className="mr-2" /> Liều Kinh Nghiệm
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('tdm')}
                                        className={`flex-1 flex items-center justify-center py-3 rounded-lg font-semibold transition-all duration-200 ${activeTab === 'tdm' ? 'bg-white text-blue-700 shadow-md' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-300'}`}
                                    >
                                        <IconActivity size={18} className="mr-2" /> TDM & AUC
                                    </button>
                                </div>

                                {}
                                {activeTab === 'empiric' && (
                                    <div className="space-y-6">
                                        {/* Truyền Ngắt Quãng */}
                                        <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                            <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center">Truyền Ngắt Quãng (II)</h3>
                                            
                                            <div className="grid md:grid-cols-2 gap-4">
                                                <div className="bg-emerald-50 rounded-xl p-4 border border-emerald-200">
                                                    <div className="text-emerald-800 font-bold mb-2">Liều Nạp (Loading Dose)</div>
                                                    <div className="text-3xl font-extrabold text-emerald-600">{weight ? iiLoad.dose : '---'}</div>
                                                    <div className="text-sm mt-2 text-emerald-700 space-y-1">
                                                        <p>• Pha trong: <strong>{weight ? iiLoad.vol : '-'}</strong> NaCl 0.9% / G5%</p>
                                                        <p>• Thời gian truyền: <strong>{weight ? iiLoad.time : '-'}</strong></p>
                                                    </div>
                                                </div>

                                                <div className="bg-blue-50 rounded-xl p-4 border border-blue-200 flex flex-col justify-between">
                                                    <div>
                                                        <div className="text-blue-800 font-bold mb-2">Liều Duy Trì (Maintenance)</div>
                                                        <div className="text-sm text-blue-900 mb-2 font-medium">Cách liều nạp 8-12h. Tổng liều max 4g/ngày.</div>
                                                    </div>
                                                    <div className="text-sm space-y-2">
                                                        {crrt ? (
                                                            <div className="p-2 bg-white rounded border border-blue-300 shadow-sm"><strong>CRRT:</strong> 10-15 mg/kg mỗi 24h</div>
                                                        ) : (
                                                            <>
                                                                <div className={`p-2 bg-white rounded border ${crcl >= 90 ? 'border-blue-500 shadow-md font-semibold text-blue-700' : 'border-blue-100 opacity-60'}`}><strong>CrCl &ge; 90:</strong> 15 mg/kg mỗi 8-12h</div>
                                                                <div className={`p-2 bg-white rounded border ${(crcl >= 51 && crcl < 90) ? 'border-blue-500 shadow-md font-semibold text-blue-700' : 'border-blue-100 opacity-60'}`}><strong>CrCl 51-89:</strong> 10-20 mg/kg mỗi 12h</div>
                                                                <div className={`p-2 bg-white rounded border ${(crcl >= 30 && crcl <= 50) ? 'border-blue-500 shadow-md font-semibold text-blue-700' : 'border-blue-100 opacity-60'}`}><strong>CrCl 30-50:</strong> 10-15 mg/kg q12h đến 20 mg/kg q24h</div>
                                                                <div className={`p-2 bg-white rounded border ${(crcl >= 10 && crcl < 30) ? 'border-blue-500 shadow-md font-semibold text-blue-700' : 'border-blue-100 opacity-60'}`}><strong>CrCl 10-29:</strong> 10-15 mg/kg q24h đến 15 mg/kg q48h</div>
                                                                <div className={`p-2 bg-white rounded border ${(crcl > 0 && crcl < 10) ? 'border-blue-500 shadow-md font-semibold text-blue-700' : 'border-blue-100 opacity-60'}`}><strong>CrCl &lt; 10:</strong> 500-750 mg mỗi 48h</div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Truyền Liên Tục */}
                                        <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                            <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center">Truyền Liên Tục (CI)</h3>
                                            
                                            <div className="grid md:grid-cols-2 gap-4">
                                                <div className="bg-amber-50 rounded-xl p-4 border border-amber-200">
                                                    <div className="text-amber-800 font-bold mb-2">Liều Nạp (Loading Dose)</div>
                                                    <div className="text-3xl font-extrabold text-amber-600">{weight ? ciLoad.dose : '---'}</div>
                                                    <div className="text-sm mt-2 text-amber-700 space-y-1">
                                                        <p>• Pha trong: <strong>{weight ? ciLoad.vol : '-'}</strong></p>
                                                        <p>• Thời gian truyền: <strong>{weight ? ciLoad.time : '-'}</strong></p>
                                                    </div>
                                                </div>

                                                <div className="bg-indigo-50 rounded-xl p-4 border border-indigo-200">
                                                    <div className="text-indigo-800 font-bold mb-2">Duy Trì (Bắt đầu ngay sau liều nạp)</div>
                                                    <div className="flex flex-col h-full justify-center">
                                                        <div className="text-sm text-indigo-900 mb-1">Tốc độ truyền (Nồng độ 4mg/mL):</div>
                                                        <div className="text-4xl font-extrabold text-indigo-600">{crcl > 0 ? `${ciMaintRate} mL/h` : '---'}</div>
                                                        <div className="text-sm text-indigo-700 mt-2 bg-white p-2 rounded border border-indigo-200">
                                                            Tương đương: <strong>{crcl > 0 ? `${ciMaintDose24} mg/24h` : '-'}</strong>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="mt-4 flex p-3 bg-blue-50 text-blue-800 text-sm rounded-lg border border-blue-100">
                                                <IconInfo size={16} className="mr-2 flex-shrink-0 mt-0.5" />
                                                <p>Cách pha duy trì CI: Pha 1g trong 250mL hoặc 2g trong 500mL (tạo nồng độ 4mg/mL) truyền nhỏ giọt 24h.</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {}
                                {activeTab === 'tdm' && (
                                    <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="text-xl font-bold text-slate-800">Tính AUC (Sawchuk-Zaske Method)</h3>
                                            <div className="bg-purple-100 px-3 py-1 rounded-full text-xs font-semibold text-purple-700">2-Level TDM</div>
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-8">
                                            {/* Inputs */}
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-xs font-semibold text-slate-600 uppercase">Liều đang dùng (mg)</label>
                                                        <input type="number" value={szDose} onChange={(e)=>setSzDose(e.target.value)} placeholder="Vd: 1000" className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-purple-500 outline-none" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-semibold text-slate-600 uppercase">Khoảng cách liều (h)</label>
                                                        <input type="number" value={szTau} onChange={(e)=>setSzTau(e.target.value)} className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-purple-500 outline-none" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="block text-xs font-semibold text-slate-600 uppercase">Thời gian truyền (h)</label>
                                                    <input type="number" step="0.5" value={szTInf} onChange={(e)=>setSzTInf(e.target.value)} className="w-full mt-1 p-2 border rounded bg-slate-50 focus:ring-2 focus:ring-purple-500 outline-none" />
                                                </div>

                                                <div className="p-4 bg-purple-50 border border-purple-200 rounded-xl space-y-4 shadow-sm">
                                                    <div className="flex space-x-4">
                                                        <div className="flex-1">
                                                            <label className="block text-xs font-bold text-purple-800 uppercase">Nồng độ Đỉnh (Peak)</label>
                                                            <input type="number" step="0.1" value={szCPeak} onChange={(e)=>setSzCPeak(e.target.value)} placeholder="mg/L" className="w-full mt-1 p-2 border border-purple-300 rounded focus:ring-2 focus:ring-purple-500 outline-none" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="block text-xs font-semibold text-purple-700">T/g lấy sau truyền (h)</label>
                                                            <input type="number" step="0.5" value={szT1} onChange={(e)=>setSzT1(e.target.value)} className="w-full mt-1 p-2 border border-purple-300 rounded focus:ring-2 focus:ring-purple-500 outline-none" />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex space-x-4">
                                                        <div className="flex-1">
                                                            <label className="block text-xs font-bold text-purple-800 uppercase">Nồng độ Đáy (Trough)</label>
                                                            <input type="number" step="0.1" value={szCTrough} onChange={(e)=>setSzCTrough(e.target.value)} placeholder="mg/L" className="w-full mt-1 p-2 border border-purple-300 rounded focus:ring-2 focus:ring-purple-500 outline-none" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="block text-xs font-semibold text-purple-700">T/g lấy trước liều (h)</label>
                                                            <input type="number" step="0.5" value={szT2} onChange={(e)=>setSzT2(e.target.value)} className="w-full mt-1 p-2 border border-purple-300 rounded focus:ring-2 focus:ring-purple-500 outline-none" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            {}
                                            <div className="bg-slate-800 rounded-xl p-5 text-white shadow-xl flex flex-col">
                                                <h4 className="text-slate-300 font-semibold mb-4 border-b border-slate-700 pb-2">Kết quả Dược động học</h4>
                                                
                                                {!szResult ? (
                                                    <div className="flex-1 flex items-center justify-center text-slate-500 text-sm text-center">
                                                        Nhập đủ thông số Liều, Thời gian và 2 nồng độ (Peak/Trough) để tính toán.
                                                    </div>
                                                ) : szResult.error ? (
                                                    <div className="flex-1 flex items-center justify-center text-red-400 text-sm flex-col">
                                                        <IconAlertCircle className="mb-2 text-red-500" />
                                                        {szResult.error}
                                                    </div>
                                                ) : (
                                                    <div className="space-y-4 flex-1">
                                                        <div className="grid grid-cols-2 gap-4 text-sm">
                                                            <div>
                                                                <span className="text-slate-400 block">K_e (h⁻¹)</span>
                                                                <strong className="text-lg">{szResult.ke}</strong>
                                                            </div>
                                                            <div>
                                                                <span className="text-slate-400 block">T_1/2 (h)</span>
                                                                <strong className="text-lg">{szResult.halfLife}</strong>
                                                            </div>
                                                            <div>
                                                                <span className="text-slate-400 block">V_d (L)</span>
                                                                <strong className="text-lg">{szResult.vd}</strong>
                                                            </div>
                                                            <div>
                                                                <span className="text-slate-400 block">Clearance (L/h)</span>
                                                                <strong className="text-lg">{szResult.cl}</strong>
                                                            </div>
                                                            <div>
                                                                <span className="text-slate-400 block">True Peak</span>
                                                                <strong className="text-lg text-purple-300">{szResult.truePeak}</strong>
                                                            </div>
                                                            <div>
                                                                <span className="text-slate-400 block">True Trough</span>
                                                                <strong className="text-lg text-purple-300">{szResult.trueTrough}</strong>
                                                            </div>
                                                        </div>

                                                        <div className="mt-4 p-4 bg-emerald-900/50 rounded-lg border border-emerald-700/50">
                                                            <div className="text-emerald-400 text-sm mb-1 uppercase font-bold tracking-wider">AUC 24h Ước tính</div>
                                                            <div className="text-4xl font-extrabold text-white">{szResult.auc24}</div>
                                                            <div className="text-xs text-emerald-300 mt-1">Mục tiêu protocol: 400 - 600 (Max 800)</div>
                                                        </div>
                                                        
                                                        <div className="pt-4 mt-4 border-t border-slate-700">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <span className="text-sm font-semibold text-slate-300">Gợi ý chỉnh liều tuyến tính</span>
                                                                <select value={targetAUC} onChange={(e)=>setTargetAUC(e.target.value)} className="bg-slate-700 text-white text-xs p-1 rounded border border-slate-600 outline-none focus:ring-1 focus:ring-blue-500">
                                                                    <option value="400">Target AUC 400</option>
                                                                    <option value="500">Target AUC 500</option>
                                                                    <option value="600">Target AUC 600</option>
                                                                </select>
                                                            </div>
                                                            <div className="bg-slate-900 p-3 rounded text-sm text-yellow-300 flex items-center border border-slate-700">
                                                                <IconSyringe size={16} className="mr-2 flex-shrink-0" />
                                                                <span>Liều mới / 24h = <strong className="text-lg ml-1">{Math.round(szDose * (24/szTau) * (Number(targetAUC) / szResult.auc24))} mg</strong></span>
                                                            </div>
                                                            <p className="text-[10px] text-slate-500 mt-2 italic">*Công thức: Liều mới = Liều hiện tại x (AUC mục tiêu / AUC tính toán). Luôn đánh giá lại lâm sàng.</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
