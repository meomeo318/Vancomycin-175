<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancomycin Calculator - Hello Kitty Edition 🎀</title>
    
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tải React và ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Tải Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Quicksand', ui-sans-serif, system-ui, sans-serif; 
            /* Nền dâu tây */
            background-color: #fff1f2;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='15' y='35' font-size='20' opacity='0.3'%3E🍓%3C/text%3E%3C/svg%3E");
        }
        
        /* Thay đổi thanh cuộn màu hồng */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

        /* --- CÁC HIỆU ỨNG HOẠT HÌNH --- */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            70% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-slide-up { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-heartbeat { animation: heartbeat 2s ease-in-out infinite; }
        .hover-wiggle:hover svg { animation: wiggle 0.4s ease-in-out; }
    </style>
</head>
<body class="text-pink-900 selection:bg-pink-300 selection:text-pink-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconBow = ({ size = 28, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
                <path d="M12 14.5C13.3807 14.5 14.5 13.3807 14.5 12C14.5 10.6193 13.3807 9.5 12 9.5C10.6193 9.5 9.5 10.6193 9.5 12C9.5 13.3807 10.6193 14.5 12 14.5Z" fill="#F43F5E"/>
                <path d="M10 12C10 13.5 6 16.5 3 16.5C3 12 5 8.5 10 12Z" fill="#FB7185"/>
                <path d="M14 12C14 13.5 18 16.5 21 16.5C21 12 19 8.5 14 12Z" fill="#FB7185"/>
            </svg>
        );

        const IconHeart = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
        );

        const IconSyringe = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="18 2 22 6"></polyline>
                <line x1="18" y1="2" x2="22" y2="6"></line>
                <line x1="14" y1="4" x2="14.5" y2="4.5"></line>
                <line x1="10" y1="8" x2="10.5" y2="8.5"></line>
                <path d="M19.22 8.78A2 2 0 0 0 17.81 8.2L13.8 4.19a2 2 0 0 0-2.83 0l-1.41 1.41 7.07 7.07 1.41-1.41a2 2 0 0 0 1.18-2.48z"></path>
                <path d="M9.17 11.23L4.93 15.47a2.83 2.83 0 1 0 4 4l4.24-4.24-4-4z"></path>
                <line x1="2" y1="22" x2="4.93" y2="19.07"></line>
            </svg>
        );

        const IconAlertCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const calculateCrCl = (age, weight, scr, isFemale) => {
            if (!age || !weight || !scr) return 0;
            let crcl = ((140 - age) * weight) / (72 * scr);
            if (isFemale) crcl *= 0.85;
            return crcl.toFixed(1);
        };

        const calculateBMI = (weight, height) => {
            if (!weight || !height) return 0;
            return (weight / ((height / 100) ** 2)).toFixed(1);
        };

        const getIILoadingDose = (weight, crrt) => {
            if (crrt) return { dose: "20-25 mg/kg (Tối đa 2g)", vol: "500 mL", time: "4 giờ" };
            if (!weight) return { dose: "---", vol: "-", time: "-" };
            if (weight < 36) return { dose: "Chưa có dl chuẩn", vol: "-", time: "-" };
            if (weight <= 45) return { dose: "750 mg", vol: "250 mL", time: "90 phút" };
            if (weight <= 55) return { dose: "1000 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 65) return { dose: "1250 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 75) return { dose: "1500 mg", vol: "500 mL", time: "3 giờ" };
            if (weight <= 120) return { dose: "1750 mg", vol: "500 mL", time: "4 giờ" };
            return { dose: "2000 mg", vol: "500 mL", time: "4 giờ" };
        };

        const getCILoadingDose = (weight, crcl) => {
            if (!weight) return { dose: "---", vol: "-", time: "-" };
            if (weight < 40) return { dose: "750 mg", vol: "250 mL", time: "90 phút" };
            if (weight <= 44) return { dose: "1000 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 54) return { dose: "1250 mg", vol: "250 mL", time: "2 giờ" };
            if (weight <= 64) return { dose: "1500 mg", vol: "500 mL", time: "3 giờ" };
            if (weight <= 79) return { dose: "2000 mg", vol: "500 mL", time: "4 giờ" };
            if (weight <= 119) return { dose: "2500 mg", vol: "750 mL", time: "4 giờ" };
            if (crcl < 60) return { dose: "2500 mg", vol: "750 mL", time: "4 giờ" };
            return { dose: "3000 mg (Tối đa)", vol: "750 mL", time: "4 giờ" };
        };

        const getCIMaintenanceRate = (crcl) => {
            if (!crcl) return 0;
            if (crcl < 10) return 3;
            if (crcl <= 15) return 4;
            if (crcl <= 20) return 5;
            if (crcl <= 30) return 8;
            if (crcl <= 40) return 10;
            if (crcl <= 50) return 12;
            if (crcl <= 62) return 15;
            if (crcl <= 83) return 20;
            if (crcl <= 99) return 23;
            return 30;
        };

        const calculateSZ = (dose, tau, tInf, cPeak, cTrough, t1, t2) => {
            if (!dose || !tau || !tInf || !cPeak || !cTrough) return null;
            const deltaT = tau - tInf - t1 - t2; 
            if (deltaT <= 0 || cPeak <= cTrough) return { error: "Dữ liệu thời gian/nồng độ không hợp lệ" };

            const ke = Math.log(cPeak / cTrough) / deltaT;
            const truePeak = cPeak * Math.exp(ke * t1);
            const trueTrough = cTrough * Math.exp(-ke * t2);
            const vd = (dose * (1 - Math.exp(-ke * tInf))) / (tInf * ke * (truePeak - trueTrough * Math.exp(-ke * tInf)));
            const cl = ke * vd;
            const dailyDose = dose * (24 / tau);
            const auc24 = dailyDose / cl;

            return {
                ke: ke.toFixed(4),
                halfLife: (0.693 / ke).toFixed(1),
                truePeak: truePeak.toFixed(1),
                trueTrough: trueTrough.toFixed(1),
                vd: vd.toFixed(1),
                cl: cl.toFixed(2),
                auc24: auc24.toFixed(0)
            };
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('empiric');
            
            const [age, setAge] = useState('');
            const [weight, setWeight] = useState('');
            const [height, setHeight] = useState('');
            const [scr, setScr] = useState('');
            const [isFemale, setIsFemale] = useState(false);
            const [crrt, setCrrt] = useState(false);
            
            const [calcKey, setCalcKey] = useState(0);

            const crcl = calculateCrCl(Number(age), Number(weight), Number(scr), isFemale);
            const bmi = calculateBMI(Number(weight), Number(height));
            
            const iiLoad = getIILoadingDose(Number(weight), crrt);
            const ciLoad = getCILoadingDose(Number(weight), Number(crcl));
            const ciMaintRate = getCIMaintenanceRate(Number(crcl));
            const ciMaintDose24 = ciMaintRate * 4 * 24; 

            const [szDose, setSzDose] = useState('');
            const [szTau, setSzTau] = useState('12');
            const [szTInf, setSzTInf] = useState('1');
            const [szCPeak, setSzCPeak] = useState('');
            const [szCTrough, setSzCTrough] = useState('');
            const [szT1, setSzT1] = useState('1'); 
            const [szT2, setSzT2] = useState('0.5'); 
            const [targetAUC, setTargetAUC] = useState('500');

            const szResult = calculateSZ(
                Number(szDose), Number(szTau), Number(szTInf), 
                Number(szCPeak), Number(szCTrough), Number(szT1), Number(szT2)
            );

            useEffect(() => {
                setCalcKey(prev => prev + 1);
            }, [weight, crcl, szResult?.auc24]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header Hello Kitty */}
                        <div className="bg-gradient-to-br from-pink-400 via-rose-300 to-pink-500 text-white p-6 md:p-8 rounded-[2rem] shadow-xl shadow-pink-300/40 flex flex-col md:flex-row items-center justify-between relative overflow-hidden border-4 border-white/40 backdrop-blur-sm">
                            <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-20 rounded-full blur-3xl animate-pulse"></div>
                            <div className="absolute bottom-0 left-10 -mb-10 w-32 h-32 bg-rose-200 opacity-30 rounded-full blur-2xl animate-pulse" style={{ animationDelay: '1s' }}></div>
                            
                            {}
                            <div className="flex items-center space-x-5 relative z-10 w-full justify-center md:justify-start">
                                <div className="bg-white/20 backdrop-blur-md p-4 rounded-full text-white shadow-inner border-2 border-white/40 animate-float flex items-center justify-center">
                                    <IconBow size={56} className="animate-heartbeat" />
                                </div>
                                <div>
                                    <h1 className="text-3xl md:text-4xl lg:text-5xl font-extrabold tracking-tight drop-shadow-md flex items-center gap-3">
                                        Vancomycin Calculator 🌸
                                    </h1>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            {/* Panel Thông tin bệnh nhân */}
                            {}
                            <div className="lg:col-span-1 bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-lg shadow-pink-200/50 border-2 border-pink-100 hover:shadow-xl transition-shadow duration-300">
                                <h2 className="text-xl font-bold mb-5 flex items-center border-b-2 border-pink-100 pb-3 text-pink-700">
                                    <span className="text-3xl mr-2">🎀</span> Thông tin bệnh nhân
                                </h2>
                                <div className="space-y-6">
                                    <div className="flex bg-pink-50 rounded-2xl p-2 shadow-inner border border-pink-100">
                                        <button 
                                            onClick={() => setIsFemale(false)}
                                            className={`flex-1 py-3 rounded-xl text-lg font-bold transition-all duration-300 active:scale-95 ${!isFemale ? 'bg-white shadow-md text-sky-500 border border-sky-100' : 'text-pink-300 hover:text-pink-500'}`}
                                        >👦 Nam</button>
                                        <button 
                                            onClick={() => setIsFemale(true)}
                                            className={`flex-1 py-3 rounded-xl text-lg font-bold transition-all duration-300 active:scale-95 ${isFemale ? 'bg-white shadow-md text-rose-500 border border-rose-100' : 'text-pink-300 hover:text-pink-500'}`}
                                        >👧 Nữ</button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="group">
                                            <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Tuổi (năm)</label>
                                            <input type="number" value={age} onChange={(e)=>setAge(e.target.value)} className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50/50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 text-pink-700 outline-none transition-all font-bold text-lg" />
                                        </div>
                                        <div className="group">
                                            <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Cân nặng (kg)</label>
                                            <input type="number" value={weight} onChange={(e)=>setWeight(e.target.value)} className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50/50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 text-pink-700 outline-none transition-all font-bold text-lg" />
                                        </div>
                                        <div className="group">
                                            <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Chiều cao (cm)</label>
                                            <input type="number" value={height} onChange={(e)=>setHeight(e.target.value)} className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50/50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 text-pink-700 outline-none transition-all font-bold text-lg" />
                                        </div>
                                        <div className="group">
                                            <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Scr (mg/dL)</label>
                                            <input type="number" step="0.1" value={scr} onChange={(e)=>setScr(e.target.value)} className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50/50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 text-pink-700 outline-none transition-all font-bold text-lg" />
                                        </div>
                                    </div>

                                    <label className="flex items-center space-x-4 bg-pink-50/80 p-4 rounded-2xl border-2 border-pink-100 cursor-pointer hover:bg-pink-100 transition-all active:scale-[0.98]">
                                        <input type="checkbox" checked={crrt} onChange={(e)=>setCrrt(e.target.checked)} className="rounded-md text-rose-500 w-6 h-6 focus:ring-rose-400 border-pink-300 accent-rose-500" />
                                        <span className="text-base font-bold text-pink-800">Đang lọc máu (CRRT) 🩸</span>
                                    </label>

                                    <div className="pt-5 border-t-2 border-pink-100">
                                        <div className="flex justify-between items-center bg-gradient-to-r from-pink-100 to-rose-100 p-5 rounded-2xl border border-pink-200 group hover:-translate-y-1 transition-transform duration-300 shadow-sm">
                                            <span className="font-bold text-rose-800 text-lg">CrCl (ml/phút)</span>
                                            <span key={calcKey} className={`text-4xl font-black text-rose-600 ${crcl > 0 ? 'animate-pop' : ''}`}>{crcl > 0 ? crcl : '🍓'}</span>
                                        </div>
                                        <div className="flex justify-between items-center mt-4 text-base text-pink-500 px-3">
                                            <span className="font-semibold">BMI: <strong className={`text-xl ml-1 ${bmi > 30 ? 'text-red-500 font-bold' : 'text-pink-700'}`}>{bmi > 0 ? bmi : '--'}</strong></span>
                                            {bmi > 30 && <span className="text-red-500 text-sm font-bold bg-red-100 px-3 py-1.5 rounded-full animate-pop">Béo phì 🍰</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                
                                {}
                                <div className="flex space-x-2 bg-pink-100/80 p-2.5 rounded-3xl shadow-inner border border-pink-200/50 backdrop-blur-sm">
                                    <button 
                                        onClick={() => setActiveTab('empiric')}
                                        className={`hover-wiggle flex-1 flex items-center justify-center py-5 rounded-2xl font-bold text-lg transition-all duration-300 active:scale-[0.97] ${activeTab === 'empiric' ? 'bg-white text-rose-600 shadow-md ring-2 ring-pink-200' : 'text-pink-500 hover:text-pink-700 hover:bg-white/60'}`}
                                    >
                                        <IconSyringe size={24} className="mr-3" /> Liều Kinh Nghiệm 🌸
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('tdm')}
                                        className={`hover-wiggle flex-1 flex items-center justify-center py-5 rounded-2xl font-bold text-lg transition-all duration-300 active:scale-[0.97] ${activeTab === 'tdm' ? 'bg-white text-rose-600 shadow-md ring-2 ring-pink-200' : 'text-pink-500 hover:text-pink-700 hover:bg-white/60'}`}
                                    >
                                        <IconHeart size={24} className="mr-3" /> TDM & Tính AUC 💖
                                    </button>
                                </div>

                                {/* TAB: EMPIRIC */}
                                {}
                                {activeTab === 'empiric' && (
                                    <div className="space-y-6 animate-slide-up">
                                        <div className="bg-white/90 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-lg shadow-pink-200/50 border-2 border-pink-100">
                                            <h3 className="text-2xl font-bold text-rose-700 mb-6 flex items-center">Truyền Ngắt Quãng (II) 🍒</h3>
                                            
                                            <div className="grid md:grid-cols-2 gap-6">
                                                <div className="bg-rose-50 rounded-3xl p-6 border-2 border-rose-100 hover:-translate-y-1 transition-transform duration-300">
                                                    <div className="text-rose-800 font-bold mb-4 uppercase text-sm tracking-wider opacity-80">Liều Nạp (Loading Dose)</div>
                                                    <div key={calcKey} className={`text-5xl font-black text-rose-600 ${weight ? 'animate-pop' : ''}`}>{weight ? iiLoad.dose : '---'}</div>
                                                    <div className="text-base mt-5 text-rose-700/80 space-y-3 font-semibold">
                                                        <p>🌷 Pha trong: <strong className="text-rose-900 bg-white px-3 py-1.5 rounded-lg">{weight ? iiLoad.vol : '-'}</strong> NaCl / G5%</p>
                                                        <p>⏰ Thời gian truyền: <strong className="text-rose-900 bg-white px-3 py-1.5 rounded-lg">{weight ? iiLoad.time : '-'}</strong></p>
                                                    </div>
                                                </div>

                                                <div className="bg-pink-50 rounded-3xl p-6 border-2 border-pink-100 flex flex-col justify-between hover:-translate-y-1 transition-transform duration-300">
                                                    <div>
                                                        <div className="text-pink-800 font-bold mb-2 uppercase text-sm tracking-wider opacity-80">Liều Duy Trì</div>
                                                        <div className="text-sm text-pink-700/70 mb-5 font-bold">Max 4g/ngày (Béo phì 4.5g). Cách liều nạp 8-12h.</div>
                                                    </div>
                                                    <div className="text-base space-y-3 font-semibold">
                                                        {crrt ? (
                                                            <div className="p-4 bg-white rounded-xl border border-pink-200 shadow-sm animate-pop text-pink-700"><strong>CRRT:</strong> 10-15 mg/kg mỗi 24h</div>
                                                        ) : (
                                                            <>
                                                                <div className={`p-3 rounded-xl border-2 transition-all ${crcl >= 90 ? 'bg-white border-pink-400 shadow-md text-rose-600 scale-105 transform origin-left' : 'bg-white/50 border-pink-100 text-pink-400'}`}>CrCl &ge; 90: <span className="float-right">15 mg/kg q8-12h</span></div>
                                                                <div className={`p-3 rounded-xl border-2 transition-all ${(crcl >= 51 && crcl < 90) ? 'bg-white border-pink-400 shadow-md text-rose-600 scale-105 transform origin-left' : 'bg-white/50 border-pink-100 text-pink-400'}`}>CrCl 51-89: <span className="float-right">10-20 mg/kg q12h</span></div>
                                                                <div className={`p-3 rounded-xl border-2 transition-all ${(crcl >= 30 && crcl <= 50) ? 'bg-white border-pink-400 shadow-md text-rose-600 scale-105 transform origin-left' : 'bg-white/50 border-pink-100 text-pink-400'}`}>CrCl 30-50: <span className="float-right">10-15 mg/kg q12h 🌸</span></div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-white/90 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-lg shadow-pink-200/50 border-2 border-pink-100">
                                            <h3 className="text-2xl font-bold text-rose-700 mb-6 flex items-center">Truyền Liên Tục (CI) 🍓</h3>
                                            
                                            <div className="grid md:grid-cols-2 gap-6">
                                                <div className="bg-fuchsia-50 rounded-3xl p-6 border-2 border-fuchsia-100 hover:-translate-y-1 transition-transform duration-300">
                                                    <div className="text-fuchsia-800 font-bold mb-4 uppercase text-sm tracking-wider opacity-80">Liều Nạp (Loading Dose)</div>
                                                    <div key={calcKey} className={`text-5xl font-black text-fuchsia-600 ${weight ? 'animate-pop' : ''}`}>{weight ? ciLoad.dose : '---'}</div>
                                                    <div className="text-base mt-5 text-fuchsia-700/80 space-y-3 font-semibold">
                                                        <p>🌷 Pha trong: <strong className="text-fuchsia-900 bg-white px-3 py-1.5 rounded-lg">{weight ? ciLoad.vol : '-'}</strong></p>
                                                        <p>⏰ Thời gian truyền: <strong className="text-fuchsia-900 bg-white px-3 py-1.5 rounded-lg">{weight ? ciLoad.time : '-'}</strong></p>
                                                    </div>
                                                </div>

                                                <div className="bg-purple-50 rounded-3xl p-6 border-2 border-purple-100 hover:-translate-y-1 transition-transform duration-300">
                                                    <div className="text-purple-800 font-bold mb-4 uppercase text-sm tracking-wider opacity-80">Duy Trì (Sau liều nạp)</div>
                                                    <div className="flex flex-col h-full justify-center">
                                                        <div className="text-base text-purple-900/70 mb-2 font-bold">Tốc độ (Nồng độ 4mg/mL):</div>
                                                        <div key={calcKey} className={`text-5xl font-black text-purple-600 ${crcl > 0 ? 'animate-pop' : ''}`}>{crcl > 0 ? `${ciMaintRate} mL/h` : '---'}</div>
                                                        <div className="text-base text-purple-800 mt-5 bg-white p-4 rounded-xl border border-purple-100 shadow-sm font-bold">
                                                            Tương đương: <strong>{crcl > 0 ? `${ciMaintDose24} mg/24h` : '-'}</strong> 🎀
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {}
                                {activeTab === 'tdm' && (
                                    <div className="bg-white/90 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-lg shadow-pink-200/50 border-2 border-pink-100 animate-slide-up">
                                        <div className="flex items-center justify-between mb-8">
                                            <h3 className="text-2xl font-bold text-rose-700">Tính AUC (Sawchuk-Zaske) 💖</h3>
                                            <div className="bg-pink-100 px-5 py-2 rounded-full text-sm font-bold text-pink-700 animate-pulse border border-pink-200">2-Level TDM</div>
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="space-y-6">
                                                <div className="grid grid-cols-2 gap-5">
                                                    <div className="group">
                                                        <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Liều đang dùng (mg)</label>
                                                        <input type="number" value={szDose} onChange={(e)=>setSzDose(e.target.value)} placeholder="Vd: 1000" className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none transition-all font-bold text-pink-700 text-lg" />
                                                    </div>
                                                    <div className="group">
                                                        <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Khoảng cách liều (h)</label>
                                                        <input type="number" value={szTau} onChange={(e)=>setSzTau(e.target.value)} className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none transition-all font-bold text-pink-700 text-lg" />
                                                    </div>
                                                </div>

                                                <div className="group">
                                                    <label className="block text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 group-focus-within:text-rose-500 transition-colors">Thời gian truyền (h)</label>
                                                    <input type="number" step="0.5" value={szTInf} onChange={(e)=>setSzTInf(e.target.value)} className="w-full p-4 border-2 border-pink-100 rounded-xl bg-pink-50 focus:bg-white focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none transition-all font-bold text-pink-700 text-lg" />
                                                </div>

                                                <div className="p-6 bg-pink-50 border-2 border-pink-100 rounded-3xl space-y-5 shadow-inner">
                                                    <div className="flex space-x-5">
                                                        <div className="flex-1">
                                                            <label className="block text-sm font-bold text-rose-600 uppercase mb-2">Đỉnh (Peak)</label>
                                                            <input type="number" step="0.1" value={szCPeak} onChange={(e)=>setSzCPeak(e.target.value)} placeholder="mg/L" className="w-full p-3.5 border-2 border-pink-200 rounded-xl focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none font-bold text-pink-700 text-lg" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="block text-xs md:text-sm font-bold text-pink-500 mb-2">T/g lấy sau truyền (h)</label>
                                                            <input type="number" step="0.5" value={szT1} onChange={(e)=>setSzT1(e.target.value)} className="w-full p-3.5 border-2 border-pink-200 rounded-xl focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none font-bold text-pink-700 text-lg" />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex space-x-5">
                                                        <div className="flex-1">
                                                            <label className="block text-sm font-bold text-rose-600 uppercase mb-2">Đáy (Trough)</label>
                                                            <input type="number" step="0.1" value={szCTrough} onChange={(e)=>setSzCTrough(e.target.value)} placeholder="mg/L" className="w-full p-3.5 border-2 border-pink-200 rounded-xl focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none font-bold text-pink-700 text-lg" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="block text-xs md:text-sm font-bold text-pink-500 mb-2">T/g lấy trước liều (h)</label>
                                                            <input type="number" step="0.5" value={szT2} onChange={(e)=>setSzT2(e.target.value)} className="w-full p-3.5 border-2 border-pink-200 rounded-xl focus:ring-4 focus:ring-pink-200 focus:border-pink-400 outline-none font-bold text-pink-700 text-lg" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-gradient-to-br from-rose-400 to-pink-500 rounded-3xl p-8 text-white shadow-2xl shadow-rose-300/50 flex flex-col hover:-translate-y-1 transition-transform duration-300 relative overflow-hidden border-4 border-white/30">
                                                <div className="absolute top-0 right-0 -mt-8 -mr-8 w-32 h-32 bg-white opacity-20 rounded-full blur-xl"></div>
                                                
                                                <h4 className="text-white text-xl font-bold mb-6 border-b-2 border-white/20 pb-4 relative z-10 flex items-center">
                                                    Kết quả Dược động học 🐱
                                                </h4>
                                                
                                                {!szResult ? (
                                                    <div className="flex-1 flex items-center justify-center text-pink-100 text-base font-semibold text-center relative z-10">
                                                        Nhập đủ thông số Liều, Thời gian và 2 nồng độ (Peak/Trough) để mèo tính toán nhé! 🐾
                                                    </div>
                                                ) : szResult.error ? (
                                                    <div className="flex-1 flex items-center justify-center text-white text-base font-bold flex-col relative z-10 animate-pop bg-rose-600/50 rounded-2xl p-5">
                                                        <IconAlertCircle size={32} className="mb-3" />
                                                        {szResult.error}
                                                    </div>
                                                ) : (
                                                    <div className="space-y-6 flex-1 relative z-10">
                                                        <div className="grid grid-cols-3 gap-y-5 gap-x-3 text-base">
                                                            <div><span className="text-pink-100 block text-sm mb-1 font-semibold">K_e (h⁻¹)</span><strong className="text-xl">{szResult.ke}</strong></div>
                                                            <div><span className="text-pink-100 block text-sm mb-1 font-semibold">T_1/2 (h)</span><strong className="text-xl">{szResult.halfLife}</strong></div>
                                                            <div><span className="text-pink-100 block text-sm mb-1 font-semibold">V_d (L)</span><strong className="text-xl">{szResult.vd}</strong></div>
                                                            <div><span className="text-pink-100 block text-sm mb-1 font-semibold">Clearance</span><strong className="text-xl">{szResult.cl} <span className="text-xs font-normal opacity-80">L/h</span></strong></div>
                                                            <div><span className="text-pink-100 block text-sm mb-1 font-semibold">True Peak</span><strong className="text-xl">{szResult.truePeak}</strong></div>
                                                            <div><span className="text-pink-100 block text-sm mb-1 font-semibold">True Trough</span><strong className="text-xl">{szResult.trueTrough}</strong></div>
                                                        </div>

                                                        <div key={calcKey} className="mt-6 p-6 bg-white/20 backdrop-blur-md rounded-2xl border-2 border-white/40 shadow-inner animate-pop">
                                                            <div className="text-white text-sm mb-2 uppercase font-black tracking-widest drop-shadow-sm">AUC 24h Ước tính 🎀</div>
                                                            <div className="text-6xl font-black text-white drop-shadow-md">{szResult.auc24}</div>
                                                            <div className="text-sm text-pink-50 mt-3 font-bold bg-black/10 inline-block px-3 py-1.5 rounded-lg">Mục tiêu protocol: 400 - 600</div>
                                                        </div>
                                                        
                                                        <div className="pt-6 mt-6 border-t-2 border-white/20">
                                                            <div className="flex justify-between items-center mb-4">
                                                                <span className="text-base font-bold text-white">Gợi ý chỉnh liều 🍓</span>
                                                                <select value={targetAUC} onChange={(e)=>setTargetAUC(e.target.value)} className="bg-white/20 text-white text-sm p-2 rounded-xl border-2 border-white/40 outline-none focus:bg-white focus:text-rose-500 transition-all font-bold">
                                                                    <option value="400">Target AUC 400</option>
                                                                    <option value="500">Target AUC 500</option>
                                                                    <option value="600">Target AUC 600</option>
                                                                </select>
                                                            </div>
                                                            <div className="bg-white p-5 rounded-2xl text-base text-rose-500 flex items-center border-2 border-pink-200 shadow-md group">
                                                                <IconSyringe size={24} className="mr-3 flex-shrink-0 group-hover:scale-110 transition-transform text-rose-400" />
                                                                <span className="font-bold">Liều mới = <strong className="text-3xl ml-2 font-black text-rose-600">{Math.round(szDose * (24/szTau) * (Number(targetAUC) / szResult.auc24))} mg</strong><span className="text-sm font-bold opacity-80 ml-1 text-rose-400">/24h</span></span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
