<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancomycin Calculator - BVQY175</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .input-field { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // BẢNG DỮ LIỆU TỪ PROTOCOL
        const calcIntermittentLD = (weight) => {
            if (!weight || weight < 36) return null;
            if (weight <= 45) return { dose: 1000, adj: 750, vol: 250, time: "90 phút" };
            if (weight <= 55) return { dose: 1250, adj: 1000, vol: 250, time: "2 giờ" };
            if (weight <= 65) return { dose: 1500, adj: 1250, vol: 250, time: "2 giờ" };
            if (weight <= 75) return { dose: 1750, adj: 1500, vol: 500, time: "3 giờ" };
            if (weight <= 120) return { dose: 2000, adj: 1750, vol: 500, time: "4 giờ" };
            return { dose: 3000, adj: 2000, vol: 500, time: "4 giờ" };
        };

        const calcIntermittentMD = (crcl, weight) => {
            if (!crcl || !weight) return null;
            if (crcl > 130) return { warning: "Bệnh nhân ARC: Chuyển chỉ định Vancomycin đường truyền liên tục." };
            if (crcl >= 90) return { dose: "15 mg/kg", interval: "q8h - q12h", max: "30-45 mg/kg, tối đa 3g", tdm: "Cđáy: 30 phút trước liều 4" };
            if (crcl >= 51) return { dose: "10-20 mg/kg", interval: "q12h", max: "20-40 mg/kg, tối đa 3g", tdm: "Cđáy: 30 phút trước liều 4" };
            if (crcl >= 30) return { dose: "10-15 mg/kg q12h đến 20 mg/kg q24h", interval: "q12h - q24h", max: "20-30 mg/kg, tối đa 3g", tdm: "Cđáy: 30 phút trước liều 4" };
            if (crcl >= 10) return { dose: "10-15 mg/kg q24h đến 15 mg/kg q48h", interval: "q24h - q48h", max: "7.5-15 mg/kg, tối đa 3g", tdm: "q24h: Trước liều 4 / q48h: Trước liều 3" };
            return { dose: "500mg - 750mg", interval: "q48h", max: "Tùy tình trạng", tdm: "Cđáy: 30 phút trước liều 3" };
        };

        const calcContinuousLD = (weight, crcl) => {
            if (!weight) return null;
            if (weight < 40) return { dose: 750, vol: 250, time: "90 phút" };
            if (weight <= 44) return { dose: 1000, vol: 250, time: "2 giờ" };
            if (weight <= 54) return { dose: 1250, vol: 250, time: "2 giờ" };
            if (weight <= 64) return { dose: 1500, vol: 500, time: "3 giờ" };
            if (weight <= 79) return { dose: 2000, vol: 500, time: "4 giờ" };
            if (weight <= 119) return { dose: 2500, vol: 750, time: "4 giờ" };
            if (crcl && crcl < 60) return { dose: 2500, vol: 750, time: "4 giờ" };
            return { dose: 3000, vol: 750, time: "4 giờ" };
        };

        const calcContinuousMDRate = (crcl, weight) => {
            if (!crcl || !weight) return null;
            let col = 1; // 36-55
            if (weight >= 56 && weight <= 119) col = 2;
            if (weight >= 120) col = 3;

            if (crcl < 10) return col === 3 ? 4 : 3;
            if (crcl <= 15) return col === 1 ? 4 : (col === 2 ? 5 : 6);
            if (crcl <= 20) return col === 1 ? 5 : (col === 2 ? 6 : 7);
            if (crcl <= 30) return col === 3 ? 9 : 8;
            if (crcl <= 40) return col === 3 ? 11 : 10;
            if (crcl <= 50) return col === 1 ? 12 : (col === 2 ? 12 : 13);
            if (crcl <= 62) return 15;
            if (crcl <= 83) return 20;
            if (crcl <= 99) return 23;
            return 30; // >100
        };

        // COMPONENT TDM Truyền ngắt quãng
        const IntermittentTDM = () => {
            const [currentDose, setCurrentDose] = useState("");
            const [calcAUC, setCalcAUC] = useState("");
            const [targetAUC, setTargetAUC] = useState(400);

            const newDose = (currentDose && calcAUC && calcAUC > 0) 
                ? ((parseFloat(currentDose) * parseFloat(targetAUC)) / parseFloat(calcAUC)).toFixed(0) 
                : null;

            return (
                <div className="bg-blue-50 p-4 rounded-lg mt-4 border border-blue-200">
                    <h3 className="font-bold text-blue-800 mb-2">TDM: Hiệu chỉnh liều theo AUC</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="block text-sm text-gray-600">Liều hiện tại (mg)</label>
                            <input type="number" className="input-field" value={currentDose} onChange={e => setCurrentDose(e.target.value)} placeholder="Vd: 1000" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-600">AUC ước tính (mg.h/L)</label>
                            <input type="number" className="input-field" value={calcAUC} onChange={e => setCalcAUC(e.target.value)} placeholder="Vd: 350" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-600">AUC mục tiêu</label>
                            <select className="input-field" value={targetAUC} onChange={e => setTargetAUC(e.target.value)}>
                                <option value="400">400 mg.h/L (Tối thiểu)</option>
                                <option value="500">500 mg.h/L (Trung bình)</option>
                                <option value="600">600 mg.h/L (Tối đa)</option>
                            </select>
                        </div>
                    </div>
                    {newDose && (
                        <div className="p-3 bg-green-100 text-green-800 rounded border border-green-300">
                            <strong>Liều mới gợi ý:</strong> {newDose} mg <br/>
                            <span className="text-sm">(Công thức: Liều mới = Liều cũ × AUC đích / AUC ước tính)</span>
                        </div>
                    )}
                </div>
            );
        };

        // COMPONENT TDM Truyền liên tục
        const ContinuousTDM = ({ weight }) => {
            const [currentRate, setCurrentRate] = useState("");
            const [currentLevel, setCurrentLevel] = useState("");
            const targetLevel = 22.5; // Trung bình của 20-25

            let recommendation = null;

            if (currentRate && currentLevel) {
                const rate = parseFloat(currentRate);
                const level = parseFloat(currentLevel);
                const newRate = ((rate * targetLevel) / level).toFixed(1);
                
                if (level >= 0 && level <= 5) {
                    recommendation = { bolus: (15 * (weight || 60)).toFixed(0), newRate, action: "Tăng tốc độ truyền" };
                } else if (level >= 6 && level <= 10) {
                    recommendation = { bolus: (10 * (weight || 60)).toFixed(0), newRate, action: "Tăng tốc độ truyền" };
                } else if (level >= 11 && level <= 15) {
                    recommendation = { bolus: (7 * (weight || 60)).toFixed(0), newRate, action: "Tăng tốc độ truyền" };
                } else if (level >= 16 && level <= 19) {
                    recommendation = { bolus: 0, newRate, action: "Tăng tốc độ truyền" };
                } else if (level >= 20 && level <= 25) {
                    recommendation = { bolus: 0, newRate: rate, action: "Đạt đích. Giữ nguyên tốc độ." };
                } else if (level >= 26 && level <= 35) {
                    recommendation = { bolus: 0, newRate, action: "Giảm tốc độ truyền" };
                } else if (level > 35) {
                    recommendation = { bolus: 0, newRate, action: "Dừng truyền 6 giờ, sau đó truyền lại với tốc độ mới" };
                }
            }

            return (
                <div className="bg-purple-50 p-4 rounded-lg mt-4 border border-purple-200">
                    <h3 className="font-bold text-purple-800 mb-2">TDM: Hiệu chỉnh tốc độ theo nồng độ đích (20-25 mg/L)</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label className="block text-sm text-gray-600">Tốc độ hiện tại (mL/h)</label>
                            <input type="number" className="input-field" value={currentRate} onChange={e => setCurrentRate(e.target.value)} placeholder="Vd: 20" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-600">Nồng độ đo được (mg/L)</label>
                            <input type="number" className="input-field" value={currentLevel} onChange={e => setCurrentLevel(e.target.value)} placeholder="Vd: 12" />
                        </div>
                    </div>
                    {recommendation && (
                        <div className={`p-3 rounded border ${recommendation.action.includes('Đạt đích') ? 'bg-green-100 border-green-300 text-green-800' : 'bg-yellow-100 border-yellow-300 text-yellow-800'}`}>
                            <p><strong>Hướng xử trí:</strong> {recommendation.action}</p>
                            {recommendation.bolus > 0 && <p><strong>Liều nạp bổ sung:</strong> {recommendation.bolus} mg (làm tròn đến 250mg gần nhất)</p>}
                            {recommendation.action !== "Đạt đích. Giữ nguyên tốc độ." && (
                                <p><strong>Tốc độ truyền mới:</strong> {recommendation.newRate} mL/h <span className="text-sm">(tính trên mục tiêu 22.5 mg/L)</span></p>
                            )}
                            <p className="text-xs mt-2 italic text-gray-600">*Tổng liều duy trì không nên vượt quá 4g/ngày (tương đương 41 mL/h đối với nồng độ 4mg/mL).</p>
                        </div>
                    )}
                </div>
            );
        };

        // COMPONENT CHÍNH
        const App = () => {
            const [weight, setWeight] = useState(60);
            const [crcl, setCrcl] = useState(80);
            const [tab, setTab] = useState('intermittent');

            const intLD = calcIntermittentLD(weight);
            const intMD = calcIntermittentMD(crcl, weight);
            
            const contLD = calcContinuousLD(weight, crcl);
            const contMDRate = calcContinuousMDRate(crcl, weight);

            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-6">
                    <div className="text-center mb-6">
                        <h1 className="text-3xl font-bold text-blue-900">Vancomycin Calculator</h1>
                        <p className="text-gray-600 mt-2">Dựa trên Quy trình Hướng dẫn Bệnh viện Quân Y 175</p>
                    </div>

                    <div className="card bg-blue-600 text-white flex flex-col md:flex-row gap-6">
                        <div className="flex-1">
                            <label className="block text-sm font-semibold mb-1">Cân nặng thực tế (kg)</label>
                            <input 
                                type="number" 
                                className="input-field text-black text-lg font-bold" 
                                value={weight} 
                                onChange={(e) => setWeight(e.target.value)} 
                                min="30"
                            />
                        </div>
                        <div className="flex-1">
                            <label className="block text-sm font-semibold mb-1">Độ thanh thải Creatinin - CrCl (mL/phút)</label>
                            <input 
                                type="number" 
                                className="input-field text-black text-lg font-bold" 
                                value={crcl} 
                                onChange={(e) => setCrcl(e.target.value)} 
                                min="0"
                            />
                        </div>
                    </div>

                    <div className="flex border-b border-gray-300 mb-6">
                        <button 
                            className={`px-4 py-2 font-semibold transition-colors ${tab === 'intermittent' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                            onClick={() => setTab('intermittent')}
                        >
                            Truyền ngắt quãng (II)
                        </button>
                        <button 
                            className={`px-4 py-2 font-semibold transition-colors ${tab === 'continuous' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                            onClick={() => setTab('continuous')}
                        >
                            Truyền liên tục (CI)
                        </button>
                    </div>

                    {}
                    {tab === 'intermittent' && (
                        <div className="space-y-6">
                            <div className="card">
                                <h2 className="text-xl font-bold border-b pb-2 mb-4">1. Liều nạp (Loading Dose)</h2>
                                {intLD ? (
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                                        <div className="bg-gray-50 p-3 rounded"><p className="text-sm text-gray-500">Liều tính toán (~25mg/kg)</p><p className="font-bold text-lg">{intLD.dose} mg</p></div>
                                        <div className="bg-blue-50 p-3 rounded"><p className="text-sm text-gray-500">Liều điều chỉnh (*)</p><p className="font-bold text-lg text-blue-700">{intLD.adj} mg</p></div>
                                        <div className="bg-gray-50 p-3 rounded"><p className="text-sm text-gray-500">Dung môi NaCl 0.9%</p><p className="font-bold text-lg">{intLD.vol} mL</p></div>
                                        <div className="bg-gray-50 p-3 rounded"><p className="text-sm text-gray-500">Thời gian truyền</p><p className="font-bold text-lg">{intLD.time}</p></div>
                                    </div>
                                ) : <p className="text-red-500">Vui lòng nhập cân nặng hợp lệ (≥ 36kg).</p>}
                                <p className="text-xs text-gray-500 mt-3">* Liều điều chỉnh áp dụng cho BMI &gt; 30, CrCl &lt; 30, suy thận cấp, lọc máu chu kỳ.</p>
                            </div>

                            <div className="card">
                                <h2 className="text-xl font-bold border-b pb-2 mb-4">2. Liều duy trì (Maintenance Dose)</h2>
                                {intMD?.warning ? (
                                    <div className="bg-red-100 text-red-700 p-4 rounded-lg font-bold">⚠️ {intMD.warning}</div>
                                ) : (
                                    intMD && (
                                        <div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="border p-4 rounded-lg bg-green-50">
                                                    <p className="text-sm text-gray-600">Khuyến cáo liều & khoảng cách:</p>
                                                    <p className="text-2xl font-bold text-green-800">{intMD.dose}</p>
                                                    <p className="font-semibold text-green-700 mt-1">Khoảng cách: {intMD.interval}</p>
                                                </div>
                                                <div className="border p-4 rounded-lg">
                                                    <p className="text-sm text-gray-600">Tổng liều tối đa/ngày:</p>
                                                    <p className="font-bold text-lg">{intMD.max}</p>
                                                    <p className="text-sm text-gray-600 mt-2">Khuyến cáo lấy TDM:</p>
                                                    <p className="font-semibold">{intMD.tdm}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                )}
                            </div>
                            
                            <div className="card">
                                <h2 className="text-xl font-bold border-b pb-2 mb-4">3. TDM & Hiệu chỉnh</h2>
                                <IntermittentTDM />
                            </div>
                        </div>
                    )}

                    {}
                    {tab === 'continuous' && (
                        <div className="space-y-6">
                            <div className="card">
                                <h2 className="text-xl font-bold border-b pb-2 mb-4">1. Liều nạp ban đầu (Loading Dose)</h2>
                                {contLD ? (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                                        <div className="bg-blue-50 p-3 rounded"><p className="text-sm text-gray-500">Liều nạp (15-20mg/kg)</p><p className="font-bold text-xl text-blue-700">{contLD.dose} mg</p></div>
                                        <div className="bg-gray-50 p-3 rounded"><p className="text-sm text-gray-500">Dung môi NaCl 0.9%</p><p className="font-bold text-lg">{contLD.vol} mL</p></div>
                                        <div className="bg-gray-50 p-3 rounded"><p className="text-sm text-gray-500">Thời gian truyền</p><p className="font-bold text-lg">{contLD.time}</p></div>
                                    </div>
                                ) : <p className="text-red-500">Vui lòng nhập cân nặng hợp lệ.</p>}
                            </div>

                            <div className="card">
                                <h2 className="text-xl font-bold border-b pb-2 mb-4">2. Liều duy trì (Maintenance Dose)</h2>
                                <p className="mb-4 text-gray-700">Dùng ngay sau khi kết thúc liều nạp. Pha dung dịch nồng độ <strong>4 mg/mL</strong> (Vd: pha 1g trong 250mL, 2g trong 500mL).</p>
                                {contMDRate ? (
                                    <div className="bg-green-50 border border-green-200 p-6 rounded-lg text-center">
                                        <p className="text-gray-600 mb-2">Tốc độ truyền duy trì (Bơm tiêm điện/Máy truyền dịch):</p>
                                        <p className="text-4xl font-black text-green-700">{contMDRate} <span className="text-xl">mL/giờ</span></p>
                                    </div>
                                ) : <p className="text-red-500">Không thể tính toán. Kiểm tra lại Cân nặng và CrCl.</p>}
                            </div>

                            <div className="card">
                                <h2 className="text-xl font-bold border-b pb-2 mb-4">3. TDM & Hiệu chỉnh</h2>
                                <ContinuousTDM weight={weight} />
                            </div>
                        </div>
                    )}
                    
                    <div className="mt-8 text-center text-xs text-gray-400 pb-8">
                        <p>⚠️ <strong>Miễn trừ trách nhiệm y tế:</strong> Ứng dụng này chỉ mang tính chất tham khảo mô phỏng theo "QUY ĐỊNH SỬ DỤNG VANCOMYCIN TẠI BỆNH VIỆN QUÂN Y 175 (Phiên bản 01)". Quyết định điều trị cuối cùng phải do bác sĩ lâm sàng đưa ra dựa trên tình trạng cụ thể của từng bệnh nhân.</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
